<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ashish | Portfolio</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      overflow-x: hidden;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 48px;
      animation: fadeIn 1s ease forwards;
    }

    .highlight {
      color: #38bdf8;
    }

    p {
      margin-top: 15px;
      color: #94a3b8;
      font-size: 18px;
      text-align: center;
      max-width: 600px;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
    }

    .buttons {
      margin-top: 25px;
      display: flex;
      gap: 15px;
      opacity: 0;
      animation: fadeIn 2.5s ease forwards;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn-primary {
      background: white;
      color: black;
    }

    .btn-primary:hover {
      transform: scale(1.05);
    }

    .btn-outline {
      border: 1px solid white;
      color: white;
    }

    .btn-outline:hover {
      background: white;
      color: black;
    }

    /* Floating animation */
    .floating {
      position: absolute;
      width: 200px;
      height: 200px;
      background: #38bdf8;
      filter: blur(100px);
      opacity: 0.3;
      border-radius: 50%;
      animation: float 6s infinite alternate;
    }

    .floating2 {
      top: 10%;
      left: 10%;
    }

    .floating3 {
      bottom: 10%;
      right: 10%;
    }

    @keyframes float {
      from { transform: translateY(0px); }
      to { transform: translateY(50px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* Skills */
    .skills {
      margin-top: 30px;
      font-size: 14px;
      color: #38bdf8;
      opacity: 0;
      animation: fadeIn 3s ease forwards;
    }
  </style>
</head>

<body>

  <div class="floating floating2"></div>
  <div class="floating floating3"></div>

  <div class="container">
    
    <h1>
      Hi, I'm <span class="highlight">Ashish</span> 👋
    </h1>

    <p>
      Tech Lead & Full Stack Developer with 8+ years of experience in 
      WordPress, WooCommerce, Laravel, and modern web technologies. 
      Passionate about building scalable solutions and exploring AI.
    </p>

    <div class="buttons">
      <a href="#" class="btn btn-primary">View Projects</a>
      <a href="#" class="btn btn-outline">Contact Me</a>
    </div>

    <div class="skills">
      🚀 PHP | Laravel | WordPress | React | MySQL | AI Tools
    </div>

  </div>

</body>
</html>
